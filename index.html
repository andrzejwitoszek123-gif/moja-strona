<!DOCTYPE html>

<body onclick="startAudio()" style="cursor:pointer;">

<h1>Kliknij gdziekolwiek aby rozpocząć</h1>

<audio id="audio">
    <source src="muzyka.mp3" type="audio/mpeg">
</audio>

<script>
function startAudio() {
    var audio = document.getElementById("audio");
    audio.play();
    document.body.onclick = null; // tylko raz
}
</script>

</body>
