<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Moja strona</title>
</head>
<body>

<h1>Witaj na mojej stronie</h1>

<audio id="audio">
    <source src="muzyka.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function() {
    var audio = document.getElementById("audio");
    audio.play();
}, { once: true }); // wykona się tylko raz
</script>

</body>
</html>
